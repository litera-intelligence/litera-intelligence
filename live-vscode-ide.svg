    </g>

    <!-- Code Content -->
    <text x="40" y="20"><tspan fill="#F43F5E">from</tspan> <tspan fill="#38BDF8">litera_ai.core</tspan> <tspan fill="#F43F5E">import</tspan> <tspan fill="#F59E0B">AdaptiveCognitiveEngine, KnowledgeTracing</tspan></text>
    <text x="40" y="45"><tspan fill="#F43F5E">from</tspan> <tspan fill="#38BDF8">fastapi</tspan> <tspan fill="#F43F5E">import</tspan> <tspan fill="#F59E0B">FastAPI, BackgroundTasks</tspan></text>
    <text x="40" y="70"><tspan fill="#64748B"># Initialize Litera AI Diagnostic Engine for Indonesian Education Platform</tspan></text>
    <text x="40" y="95"><tspan fill="#38BDF8">app</tspan> = <tspan fill="#F59E0B">FastAPI</tspan>(title=<tspan fill="#10B981">"Litera Intelligence Core MCP Service"</tspan>, version=<tspan fill="#10B981">"2.5.0"</tspan>)</text>
    <text x="40" y="120"><tspan fill="#38BDF8">engine</tspan> = <tspan fill="#F59E0B">AdaptiveCognitiveEngine</tspan>(model_name=<tspan fill="#10B981">"litera-ai-gguf-70b"</tspan>, cot_reasoning=<tspan fill="#F43F5E">True</tspan>)</text>
    <text x="40" y="145"></text>
    <text x="40" y="170"><tspan fill="#F43F5E">@app.post</tspan>(<tspan fill="#10B981">"/v1/assessment/evaluate"</tspan>)</text>
    <text x="40" y="195"><tspan fill="#F43F5E">async def</tspan> <tspan fill="#60A5FA">evaluate_student_profile</tspan>(student_id: <tspan fill="#F59E0B">str</tspan>, response_matrix: <tspan fill="#F59E0B">dict</tspan>):</text>
    <text x="60" y="220"><tspan fill="#64748B"># Calculate diagnostic assessment &amp; adaptive learning path</tspan></text>
    <text x="60" y="245">result = <tspan fill="#F43F5E">await</tspan> engine.<tspan fill="#60A5FA">generate_personalized_pathway</tspan>(student_id, response_matrix)</text>
    <text x="60" y="270"><tspan fill="#F43F5E">return</tspan> {<tspan fill="#10B981">"status"</tspan>: <tspan fill="#10B981">"SUCCESS"</tspan>, <tspan fill="#10B981">"metrics"</tspan>: result.knowledge_score, <tspan fill="#10B981">"cot_steps"</tspan>: result.reasoning}</text>
  </g>

