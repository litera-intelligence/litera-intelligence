<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="40%" stop-color="#0B1528" />
      <stop offset="80%" stop-color="#070E1B" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Neon Cyan Electric Gradient -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="30%" stop-color="#00D2FF" />
      <stop offset="70%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>

    <!-- Glowing Border Filter -->
    <filter id="borderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .brand-title { font-family: 'Inter', 'Fira Code', system-ui, sans-serif; font-size: 52px; font-weight: 900; fill: url(#neonGlow); letter-spacing: 4px; filter: drop-shadow(0 0 16px rgba(0, 245, 212, 0.5)); }
    .brand-sub { font-family: 'Fira Code', monospace; font-size: 18px; font-weight: 700; fill: #94A3B8; letter-spacing: 5px; }
    .tagline-pill { font-family: 'Fira Code', monospace; font-size: 15px; fill: #38BDF8; font-weight: 600; }
    .cmd-line { font-family: 'Fira Code', monospace; font-size: 13px; fill: #10B981; }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; } }
    .glowing-node { animation: pulseGlow 2s infinite; }
  </style>

  <!-- Outer Frame -->
  <rect x="6" y="6" width="1188" height="388" rx="16" fill="url(#heroBg)" stroke="#1E293B" stroke-width="2" />
  <rect x="6" y="6" width="1188" height="388" rx="16" fill="none" stroke="url(#neonGlow)" stroke-width="1.5" opacity="0.6" filter="url(#borderShadow)" />

  <!-- Top Glassbar -->
  <rect x="6" y="6" width="1188" height="46" rx="16" fill="#0F172A" opacity="0.9" />
  <circle cx="35" cy="29" r="7" fill="#EF4444" />
  <circle cx="60" cy="29" r="7" fill="#F59E0B" />
  <circle cx="85" cy="29" r="7" fill="#10B981" />
  <text x="125" y="34" font-family="'Fira Code', monospace" font-size="13" fill="#64748B" font-weight="bold">LITERA INTELLIGENCE // AI OPERATING SYSTEM v2.5.0</text>
  
  <rect x="1000" y="18" width="160" height="24" rx="6" fill="#00F5D4" opacity="0.15" stroke="#00F5D4" stroke-width="1" />
  <text x="1015" y="34" font-family="'Fira Code', monospace" font-size="11" fill="#00F5D4" font-weight="bold">● UNICORN READY</text>

  <!-- Background Neural Grid Nodes -->
  <g stroke="#1E293B" stroke-width="0.7" opacity="0.4">
    <line x1="100" y1="120" x2="300" y2="220" />
    <line x1="300" y1="220" x2="500" y2="140" />
    <line x1="500" y1="140" x2="700" y2="250" />
    <line x1="700" y1="250" x2="900" y2="160" />
    <line x1="900" y1="160" x2="1100" y2="280" />
  </g>
  
  <circle cx="100" cy="120" r="4" fill="#00F5D4" class="glowing-node" />
  <circle cx="300" cy="220" r="5" fill="#38BDF8" class="glowing-node" />
  <circle cx="500" cy="140" r="6" fill="#7B61FF" class="glowing-node" />
  <circle cx="700" cy="250" r="4" fill="#10B981" class="glowing-node" />
  <circle cx="900" cy="160" r="5" fill="#00F5D4" class="glowing-node" />

  <!-- Center Hero Branding -->
  <g transform="translate(600, 165)">
    <text x="0" y="0" text-anchor="middle" class="brand-title">LITERA INTELLIGENCE</text>
    <text x="0" y="42" text-anchor="middle" class="brand-sub">FRONTIER AI &amp; ADAPTIVE LEARNING ENTERPRISE</text>
  </g>

  <!-- Tagline Pill Card -->
  <rect x="200" y="245" width="800" height="48" rx="10" fill="#0F172A" stroke="#00F5D4" stroke-width="1.5" />
  <text x="600" y="275" text-anchor="middle" class="tagline-pill">Building the Future of Education with Artificial Intelligence &amp; Model Context Protocol</text>

  <!-- Bottom Command Terminal -->
  <text x="50" y="345" class="cmd-line">~/litera-ai$ litera-cli deploy --cluster global-edge-gpu --model litera-ai-70b-gguf --status ACTIVE</text>
  <rect x="910" y="332" width="12" height="18" fill="#00F5D4" opacity="0.9" />
</svg>
