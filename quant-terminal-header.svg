<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="50%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 38px; font-weight: 800; fill: url(#neonCyan); filter: drop-shadow(0 0 12px rgba(0, 245, 212, 0.6)); }
    .sub-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 16px; font-weight: 700; fill: #94A3B8; letter-spacing: 3px; }
    .tagline-text { font-family: 'Fira Code', monospace; font-size: 14px; fill: #38BDF8; }
    .cmd-text { font-family: 'Fira Code', monospace; font-size: 13px; fill: #10B981; }
    .border-glow { stroke: #00F5D4; stroke-width: 1.5; stroke-dasharray: 800; animation: dash 8s linear infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .blinking { animation: blink 1.5s infinite; }
  </style>

  <!-- Main Terminal Window Box -->
  <rect x="5" y="5" width="990" height="310" rx="12" fill="url(#bgGrad)" stroke="#1E293B" stroke-width="2" />

  <!-- Top Bar -->
  <rect x="5" y="5" width="990" height="40" rx="12" fill="#0F172A" />
  <circle cx="30" cy="25" r="6" fill="#EF4444" />
  <circle cx="50" cy="25" r="6" fill="#F59E0B" />
  <circle cx="70" cy="25" r="6" fill="#10B981" />

  <text x="100" y="29" font-family="'Fira Code', monospace" font-size="13" font-weight="bold" fill="#64748B">SYSTEM_ONLINE | LITERA AI COGNITIVE MATRIX ACTIVE</text>
  <rect x="830" y="16" width="140" height="20" rx="4" fill="#0284C7" opacity="0.2" />
  <text x="845" y="30" font-family="'Fira Code', monospace" font-size="11" fill="#38BDF8" font-weight="bold">• OPERATIONAL</text>

  <!-- Grid Pattern Overlay -->
  <path d="M 5,90 L 995,90 M 5,140 L 995,140 M 5,190 L 995,190 M 5,240 L 995,240" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="4 4" />
  <path d="M 200,45 L 200,315 M 400,45 L 400,315 M 600,45 L 600,315 M 800,45 L 800,315" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="4 4" />

  <!-- Terminal Content -->
  <text x="40" y="80" class="cmd-text">pub async fn spawn_ai_engine() -> Result&lt;CognitiveReasoning, EngineError&gt; {</text>

  <g transform="translate(500, 130)">
    <text x="0" y="0" text-anchor="middle" class="title-text">LITERA INTELLIGENCE</text>
    <text x="0" y="32" text-anchor="middle" class="sub-text">🤖 ADVANCED AI &amp; ADAPTIVE ED-TECH PLATFORM 🇮🇩</text>
  </g>

  <!-- Tagline Box -->
  <rect x="150" y="195" width="700" height="42" rx="8" fill="#0F172A" stroke="#00F5D4" stroke-width="1" />
  <text x="500" y="221" text-anchor="middle" class="tagline-text">Building the Future of Education with Artificial Intelligence &amp; Model Context Protocol</text>

  <!-- Bottom Command Line -->
  <text x="40" y="280" class="cmd-text">~/litera-ai/core$ cargo run --release --bin litera_mcp_server --target x86_64-unknown-linux-gnu</text>
  <rect x="750" y="268" width="10" height="16" fill="#00F5D4" class="blinking" />
</svg>
